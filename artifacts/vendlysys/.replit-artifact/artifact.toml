kind = "web"
previewPath = "/"
title = "VendlySys"
version = "1.0.0"
id = "artifacts/vendlysys"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24411

[services.development]
run = "pnpm --filter @workspace/vendlysys run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendlysys", "run", "build" ]
publicDir = "artifacts/vendlysys/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24411"
BASE_PATH = "/"
