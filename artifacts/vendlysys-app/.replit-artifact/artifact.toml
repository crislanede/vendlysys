kind = "mobile"
previewPath = "/mobile/"
title = "VendlySys App"
version = "1.0.0"
id = "artifacts/vendlysys-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22208

[services.development]
run = "pnpm --filter @workspace/vendlysys-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendlysys-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/vendlysys-app", "run", "serve" ]

[services.env]
PORT = "22208"
BASE_PATH = "/mobile/"
